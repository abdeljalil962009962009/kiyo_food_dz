<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Primary favicon: scalable SVG (modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNG fallbacks -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- Apple touch icon (iOS home screen) - must be 180x180 PNG -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <!-- PWA manifest (installable app icon) -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kiyo Food" />

    <!-- SEO meta tags -->
    <title>Kiyo Food | Livraison de repas en Algerie avec suivi en direct</title>
    <meta name="description" content="Kiyo Food livre vos plats preferes en Algerie avec restaurants verifies, prix transparents, paiement a la livraison, adresses sauvegardees et suivi de commande en direct." />
    <meta name="keywords" content="Kiyo Food, livraison repas Algerie, commande restaurant Algerie, food delivery Algeria, restaurants Algerie, livraison Constantine, livraison Alger, repas a domicile" />
    <meta name="author" content="Kiyo Food" />
    <link rel="canonical" href="https://kiyo-food.store/" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kiyo Food" />
    <meta property="og:title" content="Kiyo Food | Livraison de repas en Algerie" />
    <meta property="og:description" content="Restaurants verifies, prix transparents, paiement a la livraison et suivi de commande en direct." />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Kiyo Food | Livraison de repas en Algerie" />
    <meta name="twitter:description" content="Restaurants verifies, prix transparents et suivi de commande en direct." />

    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kiyo Food",
      "alternateName": "Kiyo Food DZ",
      "url": "https://kiyo-food.store/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kiyo-food.store/restaurants?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kiyo Food",
      "url": "https://kiyo-food.store/",
      "logo": "https://kiyo-food.store/icons/icon-512x512.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["Arabic", "French", "English"]
      },
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FoodService",
      "name": "Kiyo Food",
      "description": "Food delivery marketplace in Algeria connecting customers with verified local restaurants, transparent fees, saved addresses, and live order tracking",
      "serviceType": "Food Delivery",
      "areaServed": {
        "@type": "Country",
        "name": "Algeria"
      },
      "provider": {
        "@type": "Organization",
        "name": "Kiyo Food"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            registration.addEventListener('updatefound', () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          }).catch((error) => {
            console.warn('[Kiyo] Service worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
